<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmation | BBQ Nation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111,#222);
}

.order-box{
    width:90%;
    max-width:500px;
    background:#fff;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    animation:fadeIn .5s ease;
}

.success{
    font-size:70px;
    margin-bottom:10px;
}

h2{
    color:#28a745;
    margin-bottom:15px;
}

.food-name{
    background:#f5f5f5;
    padding:15px;
    border-radius:12px;
    margin:20px 0;
    font-size:18px;
    font-weight:600;
}

.message{
    color:#666;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:#ffb703;
    color:#111;
    text-decoration:none;
    border-radius:30px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="order-box">

    <div class="success">🎉</div>

    <h2>Order Placed Successfully!</h2>

    <div class="food-name" id="foodName">
        Loading...
    </div>

    <p class="message">
        Thank you for ordering from BBQ Nation.
        Your delicious meal is being prepared.
    </p>

    <a href="index.html" class="btn">
        Back to Home
    </a>

</div>

<script>
const item = localStorage.getItem("orderedItem");

document.getElementById("foodName").innerHTML =
    "Ordered Item: " + (item || "No item selected");
</script>

</body>
</html>
