<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - BBQ Nation</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:#ffb703;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form onsubmit="loginUser(event)">
<input type="email" placeholder="Email Address" required>
<input type="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>
</div>

<script>
function loginUser(event){
    event.preventDefault();

    alert("Login Successful!");

    window.location.href = "index.html";
}
</script>

</body>
</html>
